<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Send Notification – Sugarcane Supplies</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f1f8e9;
        margin: 0;
        padding: 20px;
    }

    h1, h2 {
        text-align: center;
        color: #2e7d32;
    }

    .container {
        width: 90%;
        margin: auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px #a5d6a7;
        margin-bottom: 30px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #9ccc65;
        border-radius: 5px;
        box-sizing: border-box;
    }

    textarea {
        height: 120px;
        resize: none;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        background: #43a047;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #2e7d32;
    }

    .history-container {
        width: 90%;
        margin: auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px #c8e6c9;
    }

    .notification-card {
        border: 1px solid #9ccc65;
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 12px;
        background: #f9fff8;
        position: relative;
    }

    .notification-card h3 {
        margin: 0 0 4px 0;
        color: #2e7d32;
    }

    .notification-card p {
        margin: 0;
        color: #424242;
    }

    .notification-card small {
        display: block;
        margin-top: 6px;
        color: #757575;
        font-size: 12px;
    }

    .delete-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 4px 10px;
        font-size: 12px;
        background: #e53935;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: 0.3s;
    }

    .delete-btn:hover {
        background: #b71c1c;
    }
</style>
</head>
<body>

<h1>Send Notification</h1>

<div class="container">

    <h2>Create Notification</h2>

    <label>Title</label>
    <input type="text" id="title" placeholder="Enter title" />

    <label>Message</label>
    <textarea id="message" placeholder="Enter message"></textarea>

    <button onclick="sendNotification()">Send Notification</button>

</div>

<div class="history-container">
    <h2>Notification History</h2>
    <div id="notificationHistory">
        <!-- Previous notifications will appear here -->
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAQicAQ6T5YPCpEuSZ19tXBBotA09SQeYA",
  authDomain: "capstone-swastik.firebaseapp.com",
  projectId: "capstone-swastik",
  storageBucket: "capstone-swastik.appspot.com",
  messagingSenderId: "178017041601",
  appId: "1:178017041601:web:342d8cfe9938b6813a6840"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Send Notification
function sendNotification() {
  const title = document.getElementById("title").value.trim();
  const body = document.getElementById("message").value.trim();

  if (!title || !body) {
    alert("Title and message are required!");
    return;
  }

  db.collection("notifications").add({
    title: title,
    body: body,
    timestamp: Date.now()
  })
  .then(() => {
    alert("Notification sent successfully!");
    document.getElementById("title").value = "";
    document.getElementById("message").value = "";
  })
  .catch(err => {
    console.error("Error sending notification:", err);
    alert("Error sending notification: " + err.message);
  });
}

// Load Notifications in real-time
function loadNotifications() {
  const historyDiv = document.getElementById("notificationHistory");
  db.collection("notifications")
    .orderBy("timestamp", "desc")
    .onSnapshot(snapshot => {
        historyDiv.innerHTML = ""; // clear previous
        snapshot.forEach(doc => {
            const data = doc.data();
            const card = document.createElement("div");
            card.className = "notification-card";

            const title = document.createElement("h3");
            title.textContent = data.title;
            card.appendChild(title);

            const body = document.createElement("p");
            body.textContent = data.body;
            card.appendChild(body);

            const time = document.createElement("small");
            const date = new Date(data.timestamp);
            time.textContent = date.toLocaleString();
            card.appendChild(time);

            // Delete button
            const delBtn = document.createElement("button");
            delBtn.textContent = "Delete";
            delBtn.className = "delete-btn";
            delBtn.onclick = () => deleteNotification(doc.id);
            card.appendChild(delBtn);

            historyDiv.appendChild(card);
        });
    });
}

// Delete Notification
function deleteNotification(docId) {
  if(confirm("Are you sure you want to delete this notification?")) {
    db.collection("notifications").doc(docId).delete()
      .then(() => {
        alert("Notification deleted successfully!");
      })
      .catch(err => {
        console.error("Error deleting notification:", err);
        alert("Error deleting notification: " + err.message);
      });
  }
}

// Call on page load
loadNotifications();
</script>

</body>
</html>

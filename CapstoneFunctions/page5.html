<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Product Request Approval</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: 40px auto;
        }

        h2 {
            color: #333;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f1f1f1;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
        }

        .approve {
            background: #28a745;
        }

        .reject {
            background: #dc3545;
        }

        /* Notifications */
        #alert {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: #fff;
            padding: 15px 22px;
            border-radius: 8px;
            display: none;
            z-index: 999;
        }

        .alert-error {
            background: #dc3545;
        }

    </style>
</head>
<body>

<!-- NOTIFICATION BOX -->
<div id="alert"></div>

<div class="container">

    <h2>Customer Product Request Approval</h2>

    <div class="card">

        <table>
            <tr>
                <th>Customer</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Action</th>
            </tr>

            <tr>
                <td>Sunil More</td>
                <td>Jaggery Block</td>
                <td>2kg</td>
                <td>₹450</td>
                <td>9988776655</td>
                <td>Sangli</td>
                <td>
                    <button class="btn approve" onclick="approveCustomer('Sunil More')">Approve</button>
                    <button class="btn reject" onclick="rejectCustomer('Sunil More')">Reject</button>
                </td>
            </tr>

            <tr>
                <td>Ashwini Patil</td>
                <td>Liquid Jaggery</td>
                <td>1 liter</td>
                <td>₹300</td>
                <td>9090909090</td>
                <td>Islampur</td>
                <td>
                    <button class="btn approve" onclick="approveCustomer('Ashwini Patil')">Approve</button>
                    <button class="btn reject" onclick="rejectCustomer('Ashwini Patil')">Reject</button>
                </td>
            </tr>

        </table>

    </div>
</div>

<script>

function showMessage(msg, isError = false) {
    let alertBox = document.getElementById("alert");
    alertBox.innerText = msg;

    alertBox.classList.remove("alert-error");
    if (isError) alertBox.classList.add("alert-error");

    alertBox.style.display = "block";

    setTimeout(() => alertBox.style.display = "none", 2500);
}

function approveCustomer(name) {
    showMessage("Approved: Notification sent to " + name);
}

function rejectCustomer(name) {
    showMessage("Rejected: Notification sent to " + name, true);
}

</script>

</body>
</html>

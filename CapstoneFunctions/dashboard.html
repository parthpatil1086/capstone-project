<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Sugarcane Products & Supplies Management</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: "Segoe UI", Arial, sans-serif;
    background-color: #f5f7fa;
    height: 100vh;
}
.sidebar {
    width: 260px;
    background-color: #1e5a23;
    color: white;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    padding-top: 20px;
    overflow-y: auto;
}
.sidebar h2 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 20px;
}
.sidebar a {
    text-decoration: none;
    padding: 12px 25px;
    font-size: 17px;
    color: white;
    display: block;
    transition: 0.3s;
    cursor: pointer;
}
.sidebar a:hover { background-color: #14501a; }
.sidebar a.active { background-color: #14501a; font-weight: bold; }
.main-container {
    margin-left: 260px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
header {
    background-color: #2b7a33;
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    flex-shrink: 0;
}
.content-area {
    padding: 20px 40px;
    background: white;
    flex-grow: 1;
    overflow-y: auto;
    border-radius: 12px;
    margin: 15px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    opacity: 0;
    transition: opacity 0.3s ease;
}
.content-area.show { opacity: 1; }
/* Dashboard cards */
.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}
.card {
    background: #f5f7fa;
    padding: 20px;
    text-align: center;
    border-radius: 12px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.15);
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-5px);
    background: #e9fbe9;
}
.card h3 { margin: 0; font-size: 20px; color: #1e5a23; }
.card p { margin-top: 10px; font-size: 18px; font-weight: bold; color: #333; }
.section-title { font-size: 22px; font-weight: 600; color: #1e5a23; margin: 10px 0 15px 0; }
/* Notifications Styles */
.container {
    width: 100%;
    background: #ffffff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px #a5d6a7;
    margin-bottom: 30px;
}
label { font-weight: bold; display: block; margin-top: 15px; }
input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #9ccc65;
    border-radius: 5px;
    box-sizing: border-box;
}
textarea { height: 120px; resize: none; }
button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #43a047;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}
button:hover { background: #2e7d32; }
.history-container {
    width: 100%;
    background: #ffffff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px #c8e6c9;
}
.notification-card {
    border: 1px solid #9ccc65;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 12px;
    background: #f9fff8;
    position: relative;
}
.notification-card h3 { margin: 0 0 4px 0; color: #2e7d32; }
.notification-card p { margin: 0; color: #424242; }
.notification-card small { display: block; margin-top: 6px; color: #757575; font-size: 12px; }
.delete-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 4px 10px;
    font-size: 12px;
    background: #e53935;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.3s;
}
.delete-btn:hover { background: #b71c1c; }
</style>
</head>

<body>
<div class="sidebar">
<h2>Admin Panel</h2>
<a href="#" onclick="loadPageFromPages('dashboard', this)" class="active">Dashboard Overview</a>
<a href="#" onclick="loadPageFromPages('procurement', this)">Raw Material Procurement</a>
<a href="#" onclick="loadPageFromPages('production', this)">Production & Stock</a>
<a href="#" onclick="loadPageFromPages('sales', this)">Sales Information</a>
<a href="#" onclick="loadPageFromPages('requests', this)">Supplier Request Approval</a>
<a href="#" onclick="loadPageFromPages('order', this)">Order Status Management</a>
<a href="#" onclick="loadPageFromPages('accounts', this)">Payment & Accounts</a>
<a href="#" onclick="loadPageFromPages('suppliersCustomer', this)">Supplier & Customer List</a>
<a href="#" onclick="loadPageFromPages('notifications', this)">Send Notification</a>
</div>

<div class="main-container">
<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <img src="Shree_swastik-removebg-preview.png" alt="Logo" style="width:45px; height:45px; border-radius:50%; background:white;">
        <div style="font-weight:600; font-size:22px;">SwastikAgro</div>
    </div>
    <div>Admin ▾</div>
</header>

<div class="content-area" id="content-area"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyAQicAQ6T5YPCpEuSZ19tXBBotA09SQeYA",
    authDomain: "capstone-swastik.firebaseapp.com",
    projectId: "capstone-swastik",
    storageBucket: "capstone-swastik.appspot.com",
    messagingSenderId: "178017041601",
    appId: "1:178017041601:web:342d8cfe9938b6813a6840"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const pages = {
    dashboard: `<h2 class="section-title">Dashboard Overview</h2>
        <div class="cards">
            <div class="card"><h3>Current Stock</h3><p>---</p></div>
            <div class="card"><h3>Pending Requests</h3><p>---</p></div>
            <div class="card"><h3>Approved Orders</h3><p>---</p></div>
            <div class="card"><h3>Delivered Orders</h3><p>---</p></div>
        </div>`,

    notifications: `
        <div class="container">
            <h2>Create Notification</h2>
            <label>Title</label>
            <input type="text" id="title" placeholder="Enter title" />
            <label>Message</label>
            <textarea id="message" placeholder="Enter message"></textarea>
            <button onclick="sendNotification()">Send Notification</button>
        </div>
        <div class="history-container">
            <h2>Notification History</h2>
            <div id="notificationHistory"></div>
        </div>`
};

function sendNotification() {
    const title = document.getElementById("title")?.value.trim();
    const body = document.getElementById("message")?.value.trim();
    if(!title || !body) return alert("Title and message are required!");
    db.collection("notifications").add({ title, body, timestamp: Date.now() })
      .then(()=> { alert("Notification sent!"); document.getElementById("title").value = ""; document.getElementById("message").value = ""; })
      .catch(err=>alert("Error: "+err.message));
}

function loadNotifications() {
    const historyDiv = document.getElementById("notificationHistory");
    if(!historyDiv) return;
    db.collection("notifications").orderBy("timestamp","desc").onSnapshot(snapshot=>{
        historyDiv.innerHTML = "";
        snapshot.forEach(doc=>{
            const data = doc.data();
            const card = document.createElement("div");
            card.className="notification-card";
            const title = document.createElement("h3"); title.textContent=data.title; card.appendChild(title);
            const body = document.createElement("p"); body.textContent=data.body; card.appendChild(body);
            const time = document.createElement("small"); time.textContent=new Date(data.timestamp).toLocaleString(); card.appendChild(time);
            const delBtn = document.createElement("button"); delBtn.textContent="Delete"; delBtn.className="delete-btn"; delBtn.onclick=()=>deleteNotification(doc.id); card.appendChild(delBtn);
            historyDiv.appendChild(card);
        });
    });
}

function deleteNotification(docId) {
    if(confirm("Delete this notification?")) db.collection("notifications").doc(docId).delete()
    .then(()=>alert("Notification deleted!"))
    .catch(err=>alert("Error: "+err.message));
}

window.loadPageFromPages = (page, el) => {
    document.querySelectorAll('.sidebar a').forEach(link=>link.classList.remove('active'));
    el.classList.add('active');
    const box = document.getElementById("content-area");
    box.innerHTML = pages[page];
    box.classList.add('show');
    if(page==="notifications") loadNotifications();
};

window.onload = () => { document.querySelector('.sidebar a.active').click(); };
</script>
</body>
</html>

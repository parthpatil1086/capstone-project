<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier / Farmer Request Approval</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            margin: 40px auto;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 14px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border-bottom: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background: #f1f1f1;
            font-weight: bold;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
            margin-right: 5px;
        }

        .approve { background: #28a745; }
        .reject { background: #dc3545; }
        .visit { background: #007bff; }

        /* Notification Box */
        .alert-box {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #28a745;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            display: none;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.3);
            z-index: 999;
        }

        .alert-error {
            background: #dc3545;
        }

        /* Visit Date Modal */
        #visitModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.3);
        }

        .input-date {
            width: 90%;
            padding: 8px;
            margin: 15px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .close-btn {
            padding: 8px 20px;
            background: #333;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

    </style>
</head>
<body>

<!-- Notification -->
<div id="alert" class="alert-box"></div>

<!-- Visit Date Modal -->
<div id="visitModal">
    <div class="modal-content">
        <h3>Select Visit Date</h3>
        <input type="date" id="visitDate" class="input-date">
        <br>
        <button class="btn approve" onclick="sendVisitDate()">Send</button>
        <div class="close-btn" onclick="closeVisitModal()">Close</div>
    </div>
</div>

<div class="container">

    <h2>Supplier / Farmer Request Approval</h2>

    <div class="card">

        <table>
            <tr>
                <th>Farmer Name</th>
                <th>Phone</th>
                <th>Farm Address</th>
                <th>Farm Area</th>
                <th>Growth Months</th>
                <th>Action</th>
            </tr>

            <tr>
                <td>Ramesh Patil</td>
                <td>9876543210</td>
                <td>Kadegaon, Sangli</td>
                <td>3 Acres</td>
                <td>10 Months</td>
                <td>
                    <button class="btn approve" onclick="approveRequest('Ramesh Patil')">Approve</button>
                    <button class="btn reject" onclick="rejectRequest('Ramesh Patil')">Reject</button>
                    <button class="btn visit" onclick="openVisitModal('Ramesh Patil')">Visit Date</button>
                </td>
            </tr>

        </table>

    </div>

</div>

<script>

    // Show notification box
    function showAlert(message, type = "success") {
        let alertBox = document.getElementById("alert");
        alertBox.innerText = message;

        alertBox.classList.remove("alert-error");
        if (type === "error") {
            alertBox.classList.add("alert-error");
        }

        alertBox.style.display = "block";

        setTimeout(() => {
            alertBox.style.display = "none";
        }, 2500);
    }

    // Approve
    function approveRequest(name) {
        showAlert("Approved: Notification sent to " + name);
    }

    // Reject
    function rejectRequest(name) {
        showAlert("Rejected: Notification sent to " + name, "error");
    }

    // Modal handling for Visit Date
    let selectedFarmer = "";

    function openVisitModal(name) {
        selectedFarmer = name;
        document.getElementById("visitModal").style.display = "flex";
    }

    function closeVisitModal() {
        document.getElementById("visitModal").style.display = "none";
    }

    function sendVisitDate() {
        let date = document.getElementById("visitDate").value;

        if (date === "") {
            showAlert("Please select a date!", "error");
            return;
        }

        showAlert("Visit date sent to " + selectedFarmer + ": " + date);
        closeVisitModal();
    }

</script>

</body>
</html>

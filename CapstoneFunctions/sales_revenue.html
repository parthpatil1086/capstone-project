<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Revenue – Shree Swastik Agro</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f4f6f9;
    color: #333;
}

h1 {
    text-align: center;
    color: #1b5e20;
    margin-bottom: 10px;
}

/* ---------- NAV FILTER ---------- */
.nav-filter {
    text-align: center;
    margin-bottom: 20px;
}

.nav-filter button {
    padding: 8px 14px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    background: #e0e0e0;
}

.nav-filter button:hover { background: #c8e6c9; }

/* ---------- TOTAL REVENUE ---------- */
#totalRevenue {
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 15px;
    color: #1b5e20;
}

/* ---------- CONTAINER ---------- */
.container {
    max-width: 100%;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    overflow-x: auto;
}

/* ---------- TABLE ---------- */
table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

th, td {
    padding: 6px 4px;
    border-bottom: 1px solid #ddd;
    text-align: left;
    vertical-align: middle;
    font-size: 13px;
    word-wrap: break-word;
}

th { background: #f1f1f1; font-weight: 600; }

/* ---------- FIXED WIDTH COLUMNS ---------- */
td:nth-child(3), th:nth-child(3) { width: 60px; text-align: center; } /* Qty */
td:nth-child(4), th:nth-child(4) { width: 60px; text-align: center; } /* Price */
td:nth-child(5), th:nth-child(5) { width: 80px; text-align: center; } /* Total */
td:nth-child(6), th:nth-child(6) { width: 140px; text-align: left; } /* Sold At */

/* ---------- ALERT ---------- */
#alert {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #2e7d32;
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    display: none;
    z-index: 1000;
}

.alert-error { background: #dc3545; }

/* ---------- RESPONSIVE TABLE ---------- */
@media(max-width: 1200px){
    table, thead, tbody, th, td, tr { display: block; }
    thead tr { display: none; }
    tr { margin-bottom: 10px; border-bottom: 2px solid #ddd; }
    td {
        text-align: right;
        padding-left: 50%;
        position: relative;
    }
    td::before {
        content: attr(data-label);
        position: absolute;
        left: 10px;
        width: 45%;
        padding-left: 0;
        font-weight: bold;
        text-align: left;
    }
}
</style>
</head>

<body>

<h1>Sales Revenue</h1>

<div class="nav-filter">
    <button onclick="setFilter('today')">Today</button>
    <button onclick="setFilter(7)">Last 7 Days</button>
    <button onclick="setFilter(30)">Last 30 Days</button>
    <button onclick="setFilter('all')">All Sales</button>
</div>

<div id="totalRevenue">Total Revenue: ₹0</div>
<div id="alert"></div>

<div class="container">
<table>
    <thead>
        <tr>
            <th>Product Name</th>
            <th>Buyer Name</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
            <th>Sold At</th>
        </tr>
    </thead>
    <tbody id="salesBody"></tbody>
</table>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAQicAQ6T5YPCpEuSZ19tXBBotA09SQeYA",
  authDomain: "capstone-swastik.firebaseapp.com",
  projectId: "capstone-swastik",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let dateFilter = "all";

function setFilter(val) {
    dateFilter = val;
    loadSales();
}

function showAlert(msg, error=false) {
    const alert = document.getElementById("alert");
    alert.innerText = msg;
    alert.className = error ? "alert-error" : "";
    alert.style.display = "block";
    setTimeout(()=>alert.style.display="none",2500);
}

function loadSales() {
    let query = db.collection("sales_revenue").orderBy("soldAt","desc");

    if(dateFilter !== "all") {
        const days = dateFilter === "today" ? 1 : dateFilter;
        const from = new Date();
        from.setDate(from.getDate() - days + 1); // include today
        const fromTimestamp = firebase.firestore.Timestamp.fromDate(from);
        query = query.where("soldAt", ">=", fromTimestamp);
    }

    query.onSnapshot(snapshot => {
        const body = document.getElementById("salesBody");
        body.innerHTML = "";
        let totalRevenue = 0;

        snapshot.forEach(doc => {
            const s = doc.data();

            const quantity = s.quantitySold || 1;
            const price = s.pricePerUnit || 0;
            const total = s.totalAmount || (quantity * price);
            totalRevenue += total;

            let soldAtTime = "-";
            if(s.soldAt) {
                if(s.soldAt.toDate) soldAtTime = s.soldAt.toDate().toLocaleString();
                else soldAtTime = new Date(s.soldAt).toLocaleString();
            }

            body.innerHTML += `
            <tr>
                <td data-label="Product Name">${s.productName || "-"}</td>
                <td data-label="Buyer Name">${s.buyerName || "-"}</td>
                <td data-label="Qty">${quantity}</td>
                <td data-label="Price">₹${price}</td>
                <td data-label="Total">₹${total}</td>
                <td data-label="Sold At">${soldAtTime}</td>
            </tr>`;
        });

        document.getElementById("totalRevenue").innerText = `Total Revenue: ₹${totalRevenue}`;
    });
}

// Initial load
loadSales();
</script>

</body>
</html>

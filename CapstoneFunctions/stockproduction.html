<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Management – Sugarcane Supplies</title>
<style>
body { font-family: Arial, sans-serif; background: #e8f5e9; margin:0; padding:20px; }
h1 { text-align:center; color:#2e7d32; margin-bottom:20px; }

/* Tabs */
.tab-buttons { display:flex; gap:10px; margin-bottom:20px; justify-content:center; }
.tab-buttons button {
    flex:1; padding:12px 20px; font-size:16px; font-weight:600;
    border:none; border-radius:10px 10px 0 0; cursor:pointer; background:#c8e6c9; color:#2e7d32; transition:0.3s;
}
.tab-buttons button.active { background:#43a047; color:#fff; }

/* Sections */
.section { display:none; background:#ffffff; padding:20px; border-radius:10px; box-shadow:0 10px 25px rgba(0,0,0,0.08); }
.section.active { display:block; }

/* Table */
table { width:100%; border-collapse:collapse; margin-top:10px; }
table th, table td { padding:12px; text-align:left; border-bottom:1px solid #c8e6c9; font-size:14px; }
table th { background:#a5d6a7; font-weight:600; color:#2e7d32; }

/* Card */
.card { background:#f1f8e9; border-radius:10px; padding:15px; margin-bottom:15px; }

/* Inputs */
label { display:block; font-weight:bold; margin-top:10px; color:#2e7d32; }
input, select { width:100%; padding:10px; margin-top:5px; border:1px solid #a5d6a7; border-radius:5px; font-size:14px; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
button { margin-top:15px; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
button:hover { opacity:0.9; }
.editBtn { background:#66bb6a; color:#fff; }
.editBtn.update { background:#2e7d32; }

/* Editable description */
.descEditable {
    background: #f1f8e9;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #a5d6a7;
    min-height: 40px;
    font-size: 14px;
    color: #2e7d32;
    white-space: pre-wrap;
    overflow-wrap: break-word;
}
.descEditable[contenteditable="true"] {
    border-color: #43a047;
    outline: none;
}

@media(max-width:768px){ .tab-buttons{flex-direction:column;} .tab-buttons button{width:100%;} }
</style>
</head>
<body>

<h1>Stock Management</h1>

<!-- Tabs -->
<div class="tab-buttons">
    <button id="overviewBtn" class="active" onclick="showSection('overview')">Stock Overview</button>
    <button id="updateBtn" onclick="showSection('update')">Update Stock</button>
    <button id="editBtn" onclick="showSection('edit')">Edit Product Info</button>
</div>

<!-- Stock Overview -->
<div id="overview" class="section active">
    <h2>Stock Overview</h2>
    <table>
        <thead>
            <tr>
                <th>Product Name</th>
                <th>Available Quantity</th>
                <th>Price per Unit</th>
            </tr>
        </thead>
        <tbody id="stockBody"></tbody>
    </table>
</div>

<!-- Update Stock -->
<div id="update" class="section">
    <h2>Update Stock</h2>
    <label>Select Product</label>
    <select id="productSelect">
        <option value="">-- Select Product --</option>
    </select>

    <label>Available Quantity</label>
    <input type="number" id="quantity" placeholder="Enter new quantity">

    <button onclick="updateStockProduct()">Update Quantity</button>
</div>

<!-- Edit Product Info -->
<div id="edit" class="section">
    <h2>Edit Product Info</h2>
    <div id="editCardsContainer"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAQicAQ6T5YPCpEuSZ19tXBBotA09SQeYA",
  authDomain: "capstone-swastik.firebaseapp.com",
  projectId: "capstone-swastik",
  storageBucket: "capstone-swastik.appspot.com",
  messagingSenderId: "178017041601",
  appId: "1:178017041601:web:342d8cfe9938b6813a6840"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Tab switching
function showSection(section){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab-buttons button').forEach(b=>b.classList.remove('active'));
    document.getElementById(section).classList.add('active');
    if(section==='overview') document.getElementById('overviewBtn').classList.add('active');
    if(section==='update') document.getElementById('updateBtn').classList.add('active');
    if(section==='edit') document.getElementById('editBtn').classList.add('active');
}

// Load Stock Overview
function loadStockOverview(){
    const tbody = document.getElementById('stockBody'); 
    tbody.innerHTML='';
    db.collection('products').orderBy('name').get().then(snapshot=>{
        snapshot.forEach(doc=>{
            const data = doc.data();
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${data.name}</td><td>${data.quantity||0}</td><td>${data.price||''}</td>`;
            tbody.appendChild(tr);
        });
    });
}

// Load product dropdown
function loadProductDropdown(){
    const select = document.getElementById('productSelect'); 
    select.innerHTML='<option value="">-- Select Product --</option>';
    db.collection('products').orderBy('name').get().then(snapshot=>{
        snapshot.forEach(doc=>{
            const opt=document.createElement('option'); 
            opt.value=doc.id; 
            opt.text=doc.data().name; 
            select.appendChild(opt);
        });
    });
}

// Fill quantity input on select
document.getElementById('productSelect').addEventListener('change', function(){
    const id=this.value;
    if(!id){ 
        document.getElementById('quantity').value=''; 
        return; 
    }
    db.collection('products').doc(id).get().then(doc=>{
        if(doc.exists){
            const d=doc.data();
            document.getElementById('quantity').value=d.quantity||0;
        }
    });
});

// Update Stock Quantity only
function updateStockProduct(){
    const id=document.getElementById('productSelect').value;
    if(!id){ alert("Select a product"); return; }

    const quantity=parseInt(document.getElementById('quantity').value)||0;

    db.collection('products').doc(id).update({
        quantity: quantity
    })
    .then(()=>{
        alert("Quantity updated!");
        loadStockOverview(); 
        loadProductDropdown(); 
    })
    .catch(err=>{
        console.error(err); 
        alert("Error: "+err.message);
    });
}

// Edit Product Info cards
function loadEditCards(){
    const container=document.getElementById('editCardsContainer'); 
    container.innerHTML='';
    db.collection('products').orderBy('name').get().then(snapshot=>{
        snapshot.forEach(doc=>{
            const data=doc.data();
            const card=document.createElement('div'); 
            card.className='card';
            card.innerHTML=`<h3>${data.name}</h3>
                <label>Price per Unit</label>
                <input type="text" class="priceInput" value="${data.price}" readonly>
                <label>Description</label>
                <div class="descEditable" contenteditable="false">${data.description}</div>
                <button class="btn editBtn">Edit</button>`;

            const editBtn = card.querySelector('.editBtn');
            const priceInput = card.querySelector('.priceInput');
            const descDiv = card.querySelector('.descEditable');

            editBtn.addEventListener('click', function(){
                if(editBtn.textContent==='Edit'){
                    priceInput.removeAttribute('readonly');
                    descDiv.setAttribute('contenteditable','true');
                    descDiv.focus();
                    editBtn.textContent='Update';
                    editBtn.classList.add('update');
                } else {
                    const newPrice = priceInput.value.trim() || '';
                    const newDesc = descDiv.textContent.trim() || '';

                    db.collection('products').doc(doc.id).update({price: newPrice, description: newDesc})
                    .then(()=>{
                        alert('Product updated!');
                        priceInput.setAttribute('readonly', true);
                        descDiv.setAttribute('contenteditable', 'false');
                        editBtn.textContent='Edit';
                        editBtn.classList.remove('update');
                        loadStockOverview();
                        loadProductDropdown();
                    })
                    .catch(err=>{ console.error(err); alert('Error: '+err.message); });
                }
            });

            container.appendChild(card);
        });
    });
}

// Initial load
loadStockOverview(); 
loadProductDropdown(); 
loadEditCards();
</script>

</body>
</html>

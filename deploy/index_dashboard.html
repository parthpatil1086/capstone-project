
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - ShreeSvastik Agro</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f5f7fa;
    overflow: hidden;
}

.sidebar {
    width: 260px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    background: #1e5a23;
    color: white;
    padding-top: 20px;
    transition: transform 0.3s ease;
    z-index: 200;
}
.sidebar h2 {
    text-align: center;
    margin-bottom: 25px;
}
.sidebar a {
    display: block;
    padding: 14px 25px;
    color: white;
    text-decoration: none;
    font-size: 16px;
}
.sidebar a:hover,
.sidebar a.active {
    background: #14501a;
    font-weight: 600;
}

.main-container {
    margin-left: 260px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    transition: margin-left 0.3s ease;
}

header {
    background: #2b7a33;
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.menu-btn {
    display: none;
    font-size: 26px;
    cursor: pointer;
}

.admin-box {
    cursor: pointer;
    position: relative;
}
.dropdown {
    position: absolute;
    right: 0;
    top: 45px;
    background: white;
    color: #333;
    border-radius: 6px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    width: 160px;
    display: none;
    z-index: 300;
}
.dropdown a {
    display: block;
    padding: 12px 15px;
    text-decoration: none;
    color: #333;
}
.dropdown a:hover {
    background: #f1f1f1;
}

.content-area {
    flex: 1;
    margin: 15px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    padding: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

#breadcrumb {
    font-size: 14px;
    color: #2e7d32;
    margin-bottom: 10px;
}

iframe {
    flex: 1;
    width: 100%;
    border: none;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(12px);
    transition: 0.4s;
}
iframe.show {
    opacity: 1;
    transform: translateY(0);
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 768px) {
    .sidebar {
        transform: translateX(-100%);
    }
    .sidebar.open {
        transform: translateX(0);
    }
    .main-container {
        margin-left: 0;
    }
    .menu-btn {
        display: block;
    }
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <h2>Admin Panel</h2>
    <a onclick="navigate('dashboard', this)" class="active">Dashboard</a>
    <a onclick="navigate('procurement', this)">Raw Material Procurement</a>
    <a onclick="navigate('production', this)">Production & Stock</a>
    <a onclick="navigate('sales', this)">Sales Information</a>
    <a onclick="navigate('requests', this)">Supplier Requests</a>
    <a onclick="navigate('orders', this)">Order Status</a>
    <a onclick="navigate('accounts', this)">Payments & Accounts</a>
    <a onclick="navigate('suppliers', this)">Suppliers & Customers</a>
    <a onclick="navigate('notifications', this)">Notifications</a>
</div>

<div class="main-container">

<header>
    <div style="display:flex;align-items:center;gap:15px;">
        <span class="menu-btn" onclick="toggleSidebar()">☰</span>
        <img src="img/Shree_swastik-removebg-preview.png"
             style="width:45px;height:45px;background:white;border-radius:50%;">
        <strong>ShreeSvastik Agro</strong>
    </div>

    <div class="admin-box" onclick="toggleDropdown()">
        Admin ▾
        <div class="dropdown" id="adminDropdown">
            <a onclick="logout()">Logout</a>
        </div>
    </div>
</header>

<div class="content-area">
    <div id="breadcrumb">Home / Dashboard</div>
    <iframe id="pageFrame"></iframe>
</div>

</div>

<script>

if (!localStorage.getItem("adminLoggedIn")) {
    window.location.href = "login.html";
}

function logout() {
    localStorage.removeItem("adminLoggedIn");
    window.location.href = "login.html";
}

function toggleDropdown() {
    const d = document.getElementById("adminDropdown");
    d.style.display = d.style.display === "block" ? "none" : "block";
}
document.addEventListener("click", e => {
    if (!e.target.closest(".admin-box")) {
        document.getElementById("adminDropdown").style.display = "none";
    }
});

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("open");
}

document.addEventListener("click", e => {
    const sidebar = document.getElementById("sidebar");
    const menuBtn = document.querySelector(".menu-btn");

    if (window.innerWidth <= 768) {
        if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
            sidebar.classList.remove("open");
        }
    }
});

let touchStartX = 0;
let touchEndX = 0;

document.addEventListener("touchstart", e => {
    touchStartX = e.changedTouches[0].screenX;
});

document.addEventListener("touchend", e => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
});

function handleSwipe() {
    const sidebar = document.getElementById("sidebar");

    if (touchEndX - touchStartX > 70) {
        sidebar.classList.add("open");
    }
    if (touchStartX - touchEndX > 70) {
        sidebar.classList.remove("open");
    }
}

const pages = {
    dashboard:{file:"dashboard.html",name:"Dashboard Overview"},
    procurement:{file:"procurement.html",name:"Procurement"},
    production:{file:"stockproduction.html",name:"Production & Stock"},
    sales:{file:"sales_revenue.html",name:"Sales"},
    requests:{file:"supplier-request.html",name:"Supplier Requests"},
    orders:{file:"order_status.html",name:"Order Management"},
    accounts:{file:"payment.html",name:"Payments"},
    suppliers:{file:"user-supplier-list.html",name:"Users"},
    notifications:{file:"notification.html",name:"Notifications"}
};

const frame = document.getElementById("pageFrame");
const breadcrumb = document.getElementById("breadcrumb");

function navigate(page, el) {
    document.querySelectorAll(".sidebar a").forEach(a=>a.classList.remove("active"));
    if (el) el.classList.add("active");

    frame.classList.remove("show");
    frame.src = pages[page].file;
    breadcrumb.innerHTML = `→ ${pages[page].name}`;
    frame.onload = () => frame.classList.add("show");

    if (window.innerWidth <= 768) {
        document.getElementById("sidebar").classList.remove("open");
    }
}

window.onload = () => navigate("dashboard", document.querySelector(".sidebar a"));
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Overview</title>

<style>
/* ---------- DASHBOARD STYLES ---------- */
.section-title {
    font-size: 22px;
    font-weight: 600;
    color: #1e5a23;
    margin-bottom: 15px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

.card {
    background: #f5f7fa;
    padding: 25px;
    text-align: center;
    border-radius: 12px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.15);
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    background: #e9fbe9;
}

.card h3 {
    margin: 0;
    font-size: 20px;
    color: #1e5a23;
}

.card p {
    margin-top: 12px;
    font-size: 26px;
    font-weight: bold;
    color: #333;
}
</style>
</head>

<body>

<!-- <h2 class="section-title">Dashboard Overview</h2> -->

<div class="cards">
    <div class="card">
        <h3>Current Stock</h3>
        <p id="stockCount">0</p>
    </div>

    <div class="card">
        <h3>Pending Requests</h3>
        <p id="pendingCount">0</p>
    </div>

    <div class="card">
        <h3>Approved Orders</h3>
        <p id="approvedCount">0</p>
    </div>

    <div class="card">
        <h3>Delivered Orders</h3>
        <p id="deliveredCount">0</p>
    </div>
</div>

<script>
/* ---------- DASHBOARD DATA (TEMP / DEMO) ---------- */
/* Replace these values with Firebase / API later */

const dashboardData = {
    stock: 10,
    pending: 18,
    approved: 16,
    delivered: 12
};

/* ---------- SIMPLE COUNT ANIMATION ---------- */
function animateValue(id, start, end, duration) {
    const element = document.getElementById(id);
    let range = end - start;
    let current = start;
    let increment = end > start ? 1 : -1;
    let stepTime = Math.abs(Math.floor(duration / range));

    const timer = setInterval(() => {
        current += increment;
        element.textContent = current;
        if (current === end) clearInterval(timer);
    }, stepTime);
}

window.onload = () => {
    animateValue("stockCount", 0, dashboardData.stock, 800);
    animateValue("pendingCount", 0, dashboardData.pending, 800);
    animateValue("approvedCount", 0, dashboardData.approved, 800);
    animateValue("deliveredCount", 0, dashboardData.delivered, 800);
};
</script>

</body>
</html>

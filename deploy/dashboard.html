
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Overview</title>

<style>
.section-title {
    font-size: 22px;
    font-weight: 600;
    color: #1e5a23;
    margin-bottom: 15px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

.card {
    background: #f5f7fa;
    padding: 25px;
    text-align: center;
    border-radius: 12px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.15);
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    background: #e9fbe9;
}

.card h3 {
    margin: 0;
    font-size: 18px;
    color: #1e5a23;
}

.card p {
    margin-top: 12px;
    font-size: 26px;
    font-weight: bold;
    color: #333;
}
</style>
</head>

<body>

<div class="cards">

    <div class="card">
        <h3>Total Customers</h3>
        <p id="customerCount">0</p>
    </div>

    <div class="card">
        <h3>Total Suppliers</h3>
        <p id="supplierCount">0</p>
    </div>

    <div class="card">
        <h3>Pending Orders</h3>
        <p id="pendingOrders">0</p>
    </div>

    <div class="card">
        <h3>Delivered Orders</h3>
        <p id="deliveredOrders">0</p>
    </div>

    <div class="card">
        <h3>Pending Supplier Requests</h3>
        <p id="pendingSuppliers">0</p>
    </div>

    <div class="card">
        <h3>Total Sales Revenue</h3>
        <p id="totalRevenue">₹0</p>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyAQicAQ6T5YPCpEuSZ19tXBBotA09SQeYA",
    authDomain: "capstone-swastik.firebaseapp.com",
    projectId: "capstone-swastik",
    storageBucket: "capstone-swastik.appspot.com",
    messagingSenderId: "178017041601",
    appId: "1:178017041601:web:342d8cfe9938b6813a6840"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadDashboard() {

    db.collection("users").onSnapshot(snap => {
        document.getElementById("customerCount").textContent = snap.size;
    });

    db.collection("supplier").onSnapshot(snap => {
        document.getElementById("supplierCount").textContent = snap.size;
    });

    db.collection("orders")
      .where("status", "==", "Pending")
      .onSnapshot(snap => {
        document.getElementById("pendingOrders").textContent = snap.size;
      });

    db.collection("orders")
      .where("status", "==", "Delivered")
      .onSnapshot(snap => {
        document.getElementById("deliveredOrders").textContent = snap.size;
      });

    db.collection("supplier_requests")
      .where("status", "==", "Pending")
      .onSnapshot(snap => {
        document.getElementById("pendingSuppliers").textContent = snap.size;
      });

    db.collection("sales_revenue").onSnapshot(snap => {
        let total = 0;
        snap.forEach(doc => {
            total += Number(doc.data().totalAmount || 0);
        });
        document.getElementById("totalRevenue").textContent = "₹" + total;
    });
}

loadDashboard();
</script>

</body>
</html>

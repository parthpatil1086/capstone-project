
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Revenue – Shree Swastik Agro</title>

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: transparent;
    color: #333;
    height: 100%;
    overflow: hidden;
}

.page {
    padding: 15px;
    height: 100%;
    overflow: auto;
}

.page-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #1b5e20;
    margin-bottom: 10px;
}

#totalRevenue {
    text-align: center;
    font-size: 16px;
    font-weight: bold;
    margin: 5px 0 15px 0;
    color: #1b5e20;
}

#alert {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #2e7d32;
    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    display: none;
    z-index: 1000;
}
.alert-error { background: #dc3545; }

.container {
    width: 100%;
    background: #ffffff;
    padding: 12px;
    border-radius: 8px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 900px;
    text-align: center;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    font-size: 14px;
}

th {
    background: #f1f1f1;
    font-weight: 600;
}

td.payment-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
}

.payment-paid {
    font-weight: bold;
    color: #1b5e20;
}

.payment-utr {
    font-size: 12px;
    color: #555;
}

.payment-cod {
    font-weight: bold;
    color: #d84315;
}

td:nth-child(3), th:nth-child(3) { width: 60px; }
td:nth-child(4), th:nth-child(4) { width: 70px; }
td:nth-child(5), th:nth-child(5) { width: 80px; }
td:nth-child(6), th:nth-child(6) { width: 150px; }
td:nth-child(7), th:nth-child(7) { width: 140px; }


.page::-webkit-scrollbar {
    width: 8px;
}
.page::-webkit-scrollbar-thumb {
    background-color: #1b5e20;
    border-radius: 4px;
}
.page::-webkit-scrollbar-track {
    background: #f0f5f1;
}


@media(max-width: 768px) {
    table { min-width: 900px; }
    th, td { font-size: 12px; white-space: nowrap; }
    td.payment-cell { flex-direction: column; }
}
</style>
</head>

<body>
<div class="page">

    <div class="page-title">Sales Revenue</div>

    <div id="totalRevenue">Total Revenue: ₹0</div>
    <div id="alert"></div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Buyer Name</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Sold At</th>
                    <th>Payment</th>
                </tr>
            </thead>
            <tbody id="salesBody"></tbody>
        </table>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyAQicAQ6T5YPCpEuSZ19tXBBotA09SQeYA",
    authDomain: "capstone-swastik.firebaseapp.com",
    projectId: "capstone-swastik",
});

const db = firebase.firestore();

function loadSales() {
    db.collection("sales_revenue")
      .orderBy("soldAt", "desc")
      .onSnapshot(snapshot => {
        const body = document.getElementById("salesBody");
        body.innerHTML = "";
        let totalRevenue = 0;

        snapshot.forEach(doc => {
            const s = doc.data();

            const qty = Number(s.quantitySold || 1);
            const price = Number(s.pricePerUnit || 0);
            const total = Number(s.totalAmount || qty * price);
            totalRevenue += total;

            let soldAt = "-";
            if (s.soldAt) {
                soldAt = s.soldAt.toDate
                    ? s.soldAt.toDate().toLocaleString()
                    : new Date(s.soldAt).toLocaleString();
            }

            let paymentHTML = "";
            if(s.paymentMode === "ONLINE") {
                paymentHTML = `<div class="payment-cell">
                    <div class="payment-paid">ONLINE</div>
                    <div class="payment-utr">UTR: ${s.utr || "-"}</div>
                </div>`;
            } else {
                paymentHTML = `<div class="payment-cell payment-cod">COD</div>`;
            }

            body.innerHTML += `
            <tr>
                <td>${s.productName || "-"}</td>
                <td>${s.buyerName || "-"}</td>
                <td>${qty}</td>
                <td>₹${price}</td>
                <td>₹${total}</td>
                <td>${soldAt}</td>
                <td>${paymentHTML}</td>
            </tr>`;
        });

        document.getElementById("totalRevenue").innerText =
            `Total Revenue: ₹${totalRevenue}`;
    });
}

loadSales();
</script>

</body>
</html>

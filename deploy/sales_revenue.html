<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Revenue – Shree Swastik Agro</title>

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: transparent;
    color: #333;
    height: 100%;
    overflow: hidden;
}

/* PAGE WRAPPER */
.page {
    padding: 15px;
    height: 100%;
    overflow: auto;
}

/* TITLE */
.page-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #1b5e20;
    margin-bottom: 10px;
}

/* TOTAL REVENUE */
#totalRevenue {
    text-align: center;
    font-size: 16px;
    font-weight: bold;
    margin: 5px 0 15px 0;
    color: #1b5e20;
}

/* ALERT */
#alert {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #2e7d32;
    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    display: none;
    z-index: 1000;
}
.alert-error { background: #dc3545; }

/* TABLE CONTAINER */
.container {
    width: 100%;
    background: #ffffff;
    padding: 12px;
    border-radius: 8px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    overflow-x: auto; /* horizontal scroll on mobile */
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    min-width: 700px;
}

th, td {
    padding: 8px 10px;
    border-bottom: 1px solid #ddd;
    text-align: left;
    font-size: 14px;
    word-wrap: break-word;
}

th {
    background: #f1f1f1;
    font-weight: 600;
}

/* FIXED WIDTHS */
td:nth-child(3), th:nth-child(3) { width: 60px; text-align: center; }
td:nth-child(4), th:nth-child(4) { width: 70px; text-align: center; }
td:nth-child(5), th:nth-child(5) { width: 80px; text-align: center; }
td:nth-child(6), th:nth-child(6) { width: 150px; }

/* SCROLLBAR */
.page::-webkit-scrollbar {
    width: 8px;
}
.page::-webkit-scrollbar-thumb {
    background-color: #1b5e20;
    border-radius: 4px;
}
.page::-webkit-scrollbar-track {
    background: #f0f5f1;
}

/* MOBILE FIX */
@media(max-width: 768px) {
    .container {
        overflow-x: auto; /* scrollable table */
    }
    table {
        width: 100%;
        min-width: 700px;
    }
    th, td {
        white-space: nowrap; /* prevent breaking */
        font-size: 12px;
    }
}
</style>
</head>

<body>
<div class="page">

    <div class="page-title">Sales Revenue</div>

    <div id="totalRevenue">Total Revenue: ₹0</div>
    <div id="alert"></div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Buyer Name</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Sold At</th>
                </tr>
            </thead>
            <tbody id="salesBody"></tbody>
        </table>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAQicAQ6T5YPCpEuSZ19tXBBotA09SQeYA",
    authDomain: "capstone-swastik.firebaseapp.com",
    projectId: "capstone-swastik",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function showAlert(msg, error=false) {
    const alert = document.getElementById("alert");
    alert.innerText = msg;
    alert.className = error ? "alert-error" : "";
    alert.style.display = "block";
    setTimeout(() => alert.style.display = "none", 2500);
}

function loadSales() {
    db.collection("sales_revenue").orderBy("soldAt","desc")
    .onSnapshot(snapshot => {
        const body = document.getElementById("salesBody");
        body.innerHTML = "";
        let totalRevenue = 0;

        snapshot.forEach(doc => {
            const s = doc.data();
            const qty = s.quantitySold || 1;
            const price = s.pricePerUnit || 0;
            const total = s.totalAmount || (qty * price);
            totalRevenue += total;

            let soldAt = "-";
            if (s.soldAt) {
                soldAt = s.soldAt.toDate
                    ? s.soldAt.toDate().toLocaleString()
                    : new Date(s.soldAt).toLocaleString();
            }

            body.innerHTML += `
            <tr>
                <td data-label="Product Name">${s.productName || "-"}</td>
                <td data-label="Buyer Name">${s.buyerName || "-"}</td>
                <td data-label="Qty">${qty}</td>
                <td data-label="Price">₹${price}</td>
                <td data-label="Total">₹${total}</td>
                <td data-label="Sold At">${soldAt}</td>
            </tr>`;
        });

        document.getElementById("totalRevenue").innerText =
            `Total Revenue: ₹${totalRevenue}`;
    });
}

loadSales();
</script>

</body>
</html>

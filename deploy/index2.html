<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - SwastikAgro</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f5f7fa;
    overflow: hidden;
}

/* ---------- SIDEBAR ---------- */
.sidebar {
    width: 260px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    background: #1e5a23;
    color: white;
    padding-top: 20px;
}
.sidebar h2 {
    text-align: center;
    margin-bottom: 25px;
}
.sidebar a {
    display: block;
    padding: 14px 25px;
    color: white;
    text-decoration: none;
    font-size: 16px;
    transition: 0.3s;
}
.sidebar a:hover,
.sidebar a.active {
    background: #14501a;
    font-weight: 600;
}

/* ---------- MAIN ---------- */
.main-container {
    margin-left: 260px;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ---------- HEADER ---------- */
header {
    background: #2b7a33;
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* ---------- CONTENT ---------- */
.content-area {
    flex: 1;
    margin: 15px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    padding: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ---------- BREADCRUMB ---------- */
#breadcrumb {
    font-size: 14px;
    color: #2e7d32;
    margin-bottom: 10px;
    font-weight: 500;
}

/* ---------- IFRAME ---------- */
iframe {
    flex: 1;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: white;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.4s ease, transform 0.4s ease;
}

iframe.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<!-- ---------- SIDEBAR ---------- -->
<div class="sidebar">
    <h2>Admin Panel</h2>
    <a onclick="navigate('dashboard', this)" class="active">Dashboard</a>
    <a onclick="navigate('procurement', this)">Raw Material Procurement</a>
    <a onclick="navigate('production', this)">Production & Stock</a>
    <a onclick="navigate('sales', this)">Sales Information</a>
    <a onclick="navigate('requests', this)">Supplier Requests</a>
    <a onclick="navigate('orders', this)">Order Status</a>
    <a onclick="navigate('accounts', this)">Payments & Accounts</a>
    <a onclick="navigate('suppliers', this)">Suppliers & Customers</a>
    <a onclick="navigate('notifications', this)">Notifications</a>
</div>

<!-- ---------- MAIN ---------- -->
<div class="main-container">

<header>
    <div style="display:flex;align-items:center;gap:15px;">
        <img src="Shree_swastik-removebg-preview.png" style="width:45px;height:45px;background:white;border-radius:50%;">
        <strong>SwastikAgro</strong>
    </div>
    <div>Admin ▾</div>
</header>

<div class="content-area">
    <div id="breadcrumb">Home / Dashboard</div>
    <iframe id="pageFrame"></iframe>
</div>

</div>

<script>
const pages = {
    dashboard:  { file: "dashboard.html",  name: "Dashboard Overview" },
    procurement:{ file: "procurement.html",name: "Procurement" },
    production: { file: "stockproduction.html", name: "Production & Stock" },
    sales:      { file: "sales_revenue.html",      name: "Sales" },
    requests:   { file: "supplier-request.html", name: "Supplier-Farmer Requests" },
    orders:     { file: "order_status.html", name: "Order Management" },
    accounts:   { file: "payment.html",   name: "Payments Accounts" },
    suppliers:  { file: "user-supplier-list.html", name: "Customers & Suppliers list" },
    notifications:{ file: "notification.html", name: "Notifications" }
};

const frame = document.getElementById("pageFrame");
const breadcrumb = document.getElementById("breadcrumb");

/* ---------- NAVIGATION ---------- */
function navigate(page, el, push=true) {
    if (!pages[page]) return;

    document.querySelectorAll(".sidebar a").forEach(a => a.classList.remove("active"));
    if (el) el.classList.add("active");

    frame.classList.remove("show");
    frame.src = pages[page].file;

    breadcrumb.innerHTML = `->> ${pages[page].name}`;

    frame.onload = () => frame.classList.add("show");

    if (push) history.pushState({page}, "", `#${page}`);
}

/* ---------- BACK / FORWARD ---------- */
window.onpopstate = function(e) {
    if (e.state && e.state.page) {
        navigate(e.state.page, document.querySelector(`[onclick*="${e.state.page}"]`), false);
    }
};

/* ---------- INITIAL LOAD ---------- */
window.onload = () => {
    const page = location.hash.replace("#","") || "dashboard";
    navigate(page, document.querySelector(`[onclick*="${page}"]`), false);
};
</script>

</body>
</html>

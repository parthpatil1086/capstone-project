<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Order Management – Shree Swastik Agro</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f4f6f9;
    color: #333;
}

/* NAV FILTER */
.nav-filter {
    text-align: center;
    margin-bottom: 20px;
}

.nav-filter button {
    padding: 6px 12px;
    margin: 3px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    background: #e0e0e0;
    transition: 0.2s;
}
.nav-filter button:hover { background: #c8e6c9; }

/* ALERT */
#alert {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #2e7d32;
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    display: none;
    z-index: 1000;
}
.alert-error { background: #dc3545; }

/* TABLE CONTAINER */
.container {
    width: 95%;
    margin: auto;
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    overflow-x: auto;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    min-width: 900px;
}

th, td {
    padding: 8px 6px;
    border-bottom: 1px solid #ddd;
    text-align: left;
    vertical-align: middle;
    font-size: 13px;
    word-wrap: break-word;
}

th { background: #f1f1f1; font-weight: 600; }

/* COLUMN WIDTHS */
td:nth-child(4), th:nth-child(4), 
td:nth-child(5), th:nth-child(5), 
td:nth-child(6), th:nth-child(6) { width: 60px; text-align: center; }
td:nth-child(7), th:nth-child(7) { width: 140px; }
td:nth-child(9), th:nth-child(9) { width: 80px; }

/* STATUS STYLES */
.status {
    padding: 4px 8px;
    border-radius: 6px;
    color: #fff;
    font-size: 12px;
    display: inline-block;
}
.pending { background: #ffc107; }
.confirmed { background: #2196f3; }
.transit { background: #17a2b8; }
.delivered { background: #2e7d32; }
.cancelled { background: #dc3545; }

/* ACTION BUTTONS */
.action-btn {
    padding: 4px 6px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: #fff;
    font-size: 11px;
    margin: 1px;
}
.btn-confirm { background: #2196f3; }
.btn-transit { background: #17a2b8; }
.btn-delivered { background: #2e7d32; }
.btn-cancel { background: #dc3545; }
.action-btn:hover { opacity: 0.85; }

/* MOBILE FIX */
@media(max-width: 768px){
    table { min-width: 900px; }
    th, td { white-space: nowrap; font-size: 12px; }
}
</style>
</head>

<body>

<div class="nav-filter">
    <button onclick="setFilter('today')">Today</button>
    <button onclick="setFilter(7)">Last 7 Days</button>
    <button onclick="setFilter(30)">Last 30 Days</button>
    <button onclick="setFilter('all')">All Orders</button>
</div>

<div id="alert"></div>

<div class="container">
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Product</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
            <th>Order Date</th>
            <th>Address</th>
            <th>PIN</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="ordersBody"></tbody>
</table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAQicAQ6T5YPCpEuSZ19tXBBotA09SQeYA",
  authDomain: "capstone-swastik.firebaseapp.com",
  projectId: "capstone-swastik",
});
const db = firebase.firestore();

let dateFilter = "all";
let unsubscribe = null;

function setFilter(val){
    dateFilter = val;
    loadOrders();
}

function showAlert(msg, error=false){
    const a = document.getElementById("alert");
    a.innerText = msg;
    a.className = error ? "alert-error" : "";
    a.style.display = "block";
    setTimeout(()=>a.style.display="none",2500);
}

/* ✅ FIXED DATE FORMATTER */
function formatDate(timestamp){
    if(!timestamp) return "-";

    // Firestore Timestamp (compat)
    if (timestamp.toDate) {
        return timestamp.toDate().toLocaleString();
    }

    // Firestore Timestamp (seconds format)
    if (timestamp.seconds) {
        return new Date(timestamp.seconds * 1000).toLocaleString();
    }

    return "-";
}

function statusClass(s){
    return {
        Pending:"pending",
        Confirmed:"confirmed",
        "In Transit":"transit",
        Delivered:"delivered",
        Cancelled:"cancelled"
    }[s] || "pending";
}

function loadOrders(){

    if(unsubscribe) unsubscribe();

    let query = db.collection("orders");

    /* ✅ FIXED FILTER LOGIC */
    if(dateFilter !== "all"){
        let from = new Date();
        from.setHours(0,0,0,0);

        if(dateFilter !== "today"){
            from.setDate(from.getDate() - dateFilter);
        }

        query = query.where(
            "placedAt",
            ">=",
            firebase.firestore.Timestamp.fromDate(from)
        );
    }

    query = query.orderBy("placedAt", "desc");

    unsubscribe = query.onSnapshot(snapshot=>{
        const body = document.getElementById("ordersBody");
        body.innerHTML = "";

        snapshot.forEach(doc=>{
            const o = doc.data();
            const status = o.status || "Pending";

            body.innerHTML += `
            <tr>
                <td>${o.name || "-"}</td>
                <td>${o.phone || "-"}</td>
                <td>${o.productName || "-"}</td>
                <td>${o.quantity || 1}</td>
                <td>₹${o.productPrice || 0}</td>
                <td>₹${o.totalAmount || 0}</td>
                <td>${formatDate(o.placedAt)}</td>
                <td>${o.address || "-"}</td>
                <td>${o.pin || "-"}</td>
                <td>
                    <span class="status ${statusClass(status)}">${status}</span>
                    <div style="font-size:11px;color:#555;margin-top:4px;">
                        ${o.paymentMode === "ONLINE"
                            ? `Paid<br>Txn: ${o.transactionId || "-"}`
                            : "(COD)"
                        }
                    </div>
                </td>
                <td>${renderButtons(status,doc.id)}</td>
            </tr>`;
        });
    });
}

function renderButtons(status,id){
    if(status==="Delivered"||status==="Cancelled") return "";
    if(status==="Pending")
        return `<button class="action-btn btn-confirm" onclick="updateOrder('${id}','Confirmed')">Confirm</button>
                <button class="action-btn btn-cancel" onclick="updateOrder('${id}','Cancelled')">Cancel</button>`;
    if(status==="Confirmed")
        return `<button class="action-btn btn-transit" onclick="updateOrder('${id}','In Transit')">Transit</button>`;
    if(status==="In Transit")
        return `<button class="action-btn btn-delivered" onclick="updateOrder('${id}','Delivered')">Delivered</button>`;
}

async function updateOrder(id,newStatus){
    const now = firebase.firestore.Timestamp.now();
    let data = {status:newStatus};

    if(newStatus==="Confirmed") data.confirmedAt=now;
    if(newStatus==="In Transit") data.inTransitAt=now;
    if(newStatus==="Delivered") data.deliveredAt=now;
    if(newStatus==="Cancelled") data.cancelledAt=now;

    try{
        const ref = db.collection("orders").doc(id);
        const snap = await ref.get();
        const order = snap.data();

        await ref.update(data);

        if (order.productId && newStatus === "Delivered") {
            await db.runTransaction(async (transaction) => {
                const productRef = db.collection("products").doc(order.productId);
                const productSnap = await transaction.get(productRef);
                const currentStock = productSnap.data().quantity || 0;
                const orderQty = Number(order.quantity || 1);
                transaction.update(productRef, {
                    quantity: currentStock - orderQty
                });
            });
        }

        if(newStatus==="Delivered"){
            await db.collection("sales_revenue").add({
                productName: order.productName,
                quantitySold: Number(order.quantity || 1),
                pricePerUnit: Number(order.productPrice || 0),
                totalAmount: Number(order.totalAmount || 0),
                soldAt: now,
                buyerName: order.name,
                buyerPhone: order.phone,
                orderId: id,
                paymentMode: order.paymentMode || "COD",
                paymentStatus: order.paymentMode === "ONLINE" ? "Paid" : "COD",
                transactionId: order.transactionId || ""
            });

            showAlert("Delivered ✔ Stock & Sales updated");
        } else {
            showAlert("Status updated: "+newStatus);
        }
    } catch(e){
        console.error(e);
        showAlert("Error updating order",true);
    }
}

loadOrders();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Order Management – Shree Swastik Agro</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f4f6f9;
    color: #333;
}

h1 {
    text-align: center;
    color: #1b5e20;
    margin: 20px 0;
}

/* NAV FILTER */
.nav-filter {
    text-align: center;
    margin-bottom: 20px;
}

.nav-filter button {
    padding: 6px 12px;
    margin: 3px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    background: #e0e0e0;
}

.nav-filter button:hover { background: #c8e6c9; }

/* CONTAINER */
.container {
    width: 95%;
    margin: auto;
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    overflow-x: auto;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    min-width: 900px;
}

th, td {
    padding: 6px 4px;
    border-bottom: 1px solid #ddd;
    text-align: left;
    vertical-align: middle;
    font-size: 13px;
    word-wrap: break-word;
}

th { background: #f1f1f1; font-weight: 600; }

/* Column widths */
td:nth-child(4), th:nth-child(4), 
td:nth-child(5), th:nth-child(5), 
td:nth-child(6), th:nth-child(6) { width: 60px; text-align: center; }
td:nth-child(7), th:nth-child(7) { width: 140px; }
td:nth-child(9), th:nth-child(9) { width: 80px; }

/* STATUS */
.status {
    padding: 4px 8px;
    border-radius: 6px;
    color: #fff;
    font-size: 12px;
    display: inline-block;
}

.pending { background: #ffc107; }
.confirmed { background: #2196f3; }
.transit { background: #17a2b8; }
.delivered { background: #2e7d32; }
.cancelled { background: #dc3545; }

/* BUTTONS */
.action-btn {
    padding: 4px 6px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: #fff;
    font-size: 11px;
    margin: 1px;
}

.btn-confirm { background: #2196f3; }
.btn-transit { background: #17a2b8; }
.btn-delivered { background: #2e7d32; }
.btn-cancel { background: #dc3545; }

.action-btn:hover { opacity: 0.9; }

/* ALERT */
#alert {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #2e7d32;
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    display: none;
    z-index: 1000;
}

.alert-error { background: #dc3545; }

/* RESPONSIVE FOR SMALL SCREENS */
@media(max-width: 768px){
    table, thead, tbody, th, td, tr { display: block; }
    thead tr { display: none; }
    tr { margin-bottom: 10px; border-bottom: 2px solid #ddd; }
    td { text-align: right; padding-left: 50%; position: relative; }
    td::before { 
        content: attr(data-label);
        position: absolute;
        left: 10px;
        width: 45%;
        font-weight: bold;
        text-align: left;
    }
}
</style>
</head>

<body>

<!-- <h1>Admin Order Management</h1> -->

<div class="nav-filter">
    <button onclick="setFilter('today')">Today</button>
    <button onclick="setFilter(7)">Last 7 Days</button>
    <button onclick="setFilter(30)">Last 30 Days</button>
    <button onclick="setFilter('all')">All Orders</button>
</div>

<div id="alert"></div>

<div class="container">
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Product</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
            <th>Order Date</th>
            <th>Address</th>
            <th>PIN</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="ordersBody"></tbody>
</table>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAQicAQ6T5YPCpEuSZ19tXBBotA09SQeYA",
  authDomain: "capstone-swastik.firebaseapp.com",
  projectId: "capstone-swastik",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let dateFilter = "all";

function setFilter(val) {
    dateFilter = val;
    loadOrders();
}

function showAlert(msg, error=false) {
    const alert = document.getElementById("alert");
    alert.innerText = msg;
    alert.className = error ? "alert-error" : "";
    alert.style.display = "block";
    setTimeout(()=>alert.style.display="none",2500);
}

function formatDate(ts) {
    if(!ts) return "-";
    let d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleString();
}

function statusClass(status) {
    return {
        Pending: "pending",
        Confirmed: "confirmed",
        "In Transit": "transit",
        Delivered: "delivered",
        Cancelled: "cancelled"
    }[status] || "pending";
}

function loadOrders() {
    let query = db.collection("orders").orderBy("placedAt","desc");

    if(dateFilter !== "all") {
        let days = dateFilter === "today" ? 1 : dateFilter;
        let from = new Date();
        from.setDate(from.getDate() - days);
        query = query.where("placedAt", ">=", from.getTime());
    }

    query.onSnapshot(snapshot => {
        const body = document.getElementById("ordersBody");
        body.innerHTML = "";

        snapshot.forEach(doc => {
            const o = doc.data();
            const id = doc.id;
            const status = o.status || "Pending";

            body.innerHTML += `
            <tr>
                <td data-label="Name">${o.name || "-"}</td>
                <td data-label="Phone">${o.phone || "-"}</td>
                <td data-label="Product">${o.productName || "-"}</td>
                <td data-label="Qty">${o.quantity || 1}</td>
                <td data-label="Price">₹${o.productPrice || 0}</td>
                <td data-label="Total">₹${o.totalAmount || ((o.quantity||1)*(o.productPrice||0))}</td>
                <td data-label="Order Date">${formatDate(o.placedAt)}</td>
                <td data-label="Address">${o.address || "-"}</td>
                <td data-label="PIN">${o.pin || "-"}</td>
                <td data-label="Status"><span class="status ${statusClass(status)}">${status}</span></td>
                <td data-label="Action">${renderButtons(status,id)}</td>
            </tr>`;
        });
    });
}

function renderButtons(status,id) {
    if(status==="Delivered" || status==="Cancelled") return "";
    if(status==="Pending")
        return `<button class="action-btn btn-confirm" onclick="updateOrder('${id}','Confirmed')">Confirm</button>
                <button class="action-btn btn-cancel" onclick="updateOrder('${id}','Cancelled')">Cancel</button>`;
    if(status==="Confirmed")
        return `<button class="action-btn btn-transit" onclick="updateOrder('${id}','In Transit')">Transit</button>
                <button class="action-btn btn-cancel" onclick="updateOrder('${id}','Cancelled')">Cancel</button>`;
    if(status==="In Transit")
        return `<button class="action-btn btn-delivered" onclick="updateOrder('${id}','Delivered')">Delivered</button>`;
}

async function updateOrder(id, newStatus) {
    const now = firebase.firestore.Timestamp.now(); 
    let data = { status: newStatus };

    if(newStatus === "Confirmed") data.confirmedAt = now;
    if(newStatus === "In Transit") data.inTransitAt = now;
    if(newStatus === "Delivered") data.deliveredAt = now;
    if(newStatus === "Cancelled") data.cancelledAt = now;

    try {
        const orderDoc = await db.collection("orders").doc(id).get();
        const order = orderDoc.data();
        if(!order) throw new Error("Order not found");

        await db.collection("orders").doc(id).update(data);

        if(order.productId && (newStatus === "Confirmed" || newStatus === "Delivered")) {
            const productRef = db.collection("products").doc(order.productId);
            await db.runTransaction(async (transaction) => {
                const prodDoc = await transaction.get(productRef);
                if(!prodDoc.exists) throw "Product not found!";
                const currentQty = prodDoc.data().quantity || 0;
                transaction.update(productRef, { quantity: Math.max(0, currentQty - (order.quantity||1)) });
            });
        }

        if(newStatus === "Delivered") {
            await db.collection("sales_revenue").add({
                productName: order.productName || "",
                quantitySold: order.quantity || 1,
                pricePerUnit: order.productPrice || 0,
                totalAmount: order.totalAmount || ((order.quantity || 1) * (order.productPrice || 0)),
                soldAt: now,
                buyerName: order.name || "",
                buyerPhone: order.phone || "",
                orderId: id
            });
            showAlert("Order delivered, sales recorded, and stock updated!");
        } else {
            showAlert("Status updated: " + newStatus);
        }

        loadOrders();
    } catch (err) {
        console.error("Error updating order:", err);
        showAlert(err.message, true);
    }
}

// Initial load
loadOrders();
</script>

</body>
</html>

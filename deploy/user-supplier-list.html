
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supplier & Customer List</title>

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: #f1f8e9;
    color: #2e7d32;
}

.page {
    height: 100%;
    overflow-y: auto;
    padding: 15px;
}

.header-container {
    position: sticky;
    top: 0;
    background: #f1f8e9;
    z-index: 100;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.header-container h1 {
    margin: 0;
    text-align: center;
    font-size: 1.8em;
}

.header-container input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #9ccc65;
    border-radius: 5px;
    font-size: 1em;
}

.container {
    width: 100%;
    max-width: 1200px;
    margin: 20px auto 40px auto;
    padding: 10px;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.table-container {
    max-height: 65vh;
    overflow-y: auto;
    padding-right: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
}

th, td {
    padding: 10px;
    text-align: center;
    border: 1px solid #c8e6c9;
    font-size: 0.9em;
}

th {
    background: #a5d6a7;
    color: #1b5e20;
    position: sticky;
    top: 0;
    z-index: 50;
}

tbody tr:nth-child(even) { background: #f9fff4; }
tbody tr:hover { background: #d0f0c0; }

h2 {
    margin-top: 20px;
    font-size: 1.3em;
    border-bottom: 2px solid #a5d6a7;
    padding-bottom: 5px;
}

button {
    padding: 5px 12px;
    background: #e53935;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
    font-size: 0.85em;
}

button:hover {
    background: #b71c1c;
    transform: scale(1.05);
}

#customerTable { margin-bottom: 30px; }

@media(max-width: 768px) {
    th, td { font-size: 0.8em; padding: 8px; }
    h2 { font-size: 1.1em; }
    .header-container input { font-size: 0.9em; }
}
</style>
</head>

<body>
<div class="page">

    <div class="header-container">
        <input type="text" id="searchBox" placeholder="Search by name, phone, email...">
    </div>

    <div class="container">
        <div class="table-container">

            <h2>Customer List</h2>
            <table id="customerTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <h2>Supplier List</h2>
            <table id="supplierTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

        </div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAQicAQ6T5YPCpEuSZ19tXBBotA09SQeYA",
    authDomain: "capstone-swastik.firebaseapp.com",
    projectId: "capstone-swastik",
    storageBucket: "capstone-swastik.appspot.com",
    messagingSenderId: "178017041601",
    appId: "1:178017041601:web:342d8cfe9938b6813a6840"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.addEventListener("DOMContentLoaded", () => {
    const supplierTableBody = document.querySelector("#supplierTable tbody");
    const customerTableBody = document.querySelector("#customerTable tbody");
    const searchBox = document.getElementById("searchBox");

    let suppliers = [];
    let customers = [];

    onSnapshot(collection(db, "supplier"), snapshot => {
        suppliers = [];
        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            suppliers.push({
                name: data.name || "-",
                phone: data.phone || "-",
                userID: docSnap.id
            });
        });
        loadTables();
    });

    onSnapshot(collection(db, "users"), snapshot => {
        customers = [];
        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            customers.push({
                name: data.name || "-",
                phone: data.number || "-",
                email: data.email || "-",
                userID: docSnap.id
            });
        });
        loadTables();
    });

    function loadTables() {
        customerTableBody.innerHTML = "";
        customers.forEach(c => {
            customerTableBody.innerHTML += `
                <tr>
                    <td>${c.name}</td>
                    <td>${c.phone}</td>
                    <td>${c.email}</td>
                    <td><button onclick="deleteCustomer('${c.userID}')">Delete</button></td>
                </tr>`;
        });

        supplierTableBody.innerHTML = "";
        suppliers.forEach(s => {
            supplierTableBody.innerHTML += `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.phone}</td>
                    <td><button onclick="deleteSupplier('${s.userID}')">Delete</button></td>
                </tr>`;
        });
    }

    window.deleteSupplier = async (userID) => {
        if(confirm("Are you sure you want to delete this supplier?")) {
            try {
                await deleteDoc(doc(db, "supplier", userID));
                alert("Supplier deleted successfully!");
            } catch(err) {
                alert("Error deleting supplier: " + err.message);
            }
        }
    };

    window.deleteCustomer = async (userID) => {
        if(confirm("Are you sure you want to delete this customer?")) {
            try {
                await deleteDoc(doc(db, "users", userID));
                alert("Customer deleted successfully!");
            } catch(err) {
                alert("Error deleting customer: " + err.message);
            }
        }
    };

    searchBox.addEventListener("keyup", () => {
        const query = searchBox.value.toLowerCase();
        document.querySelectorAll("#supplierTable tbody tr").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(query) ? "" : "none";
        });
        document.querySelectorAll("#customerTable tbody tr").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(query) ? "" : "none";
        });
    });
});
</script>

</body>
</html>

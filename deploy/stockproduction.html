<!-- IFRAME-SAFE STOCK MANAGEMENT PAGE -->
<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: transparent;
}

/* Page title */
.page-title {
    font-size: 26px;
    font-weight: 700;
    color: #2e7d32;
    margin-bottom: 20px;
}

/* Tabs */
.tab-buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    justify-content: center;
    flex-wrap: wrap;
}
.tab-buttons button {
    padding: 12px 20px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    background: #c8e6c9;
    color: #2e7d32;
    transition: 0.3s;
}
.tab-buttons button.active {
    background: #43a047;
    color: #ffffff;
}

/* Sections */
.section {
    display: none;
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    margin-bottom: 25px;
}
.section.active { display: block; }

/* Tables */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}
table th, table td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #c8e6c9;
    font-size: 14px;
    color: #2e7d32;
}
table th { background: #a5d6a7; font-weight: 600; }

/* Inputs */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #a5d6a7;
    border-radius: 6px;
    font-size: 14px;
    box-sizing: border-box;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

/* Buttons */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}
button:hover { opacity: 0.9; }
.editBtn { background: #66bb6a; color: #ffffff; }
.editBtn.update { background: #2e7d32; }

/* Editable description */
.descEditable {
    background: #f1f8e9;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #a5d6a7;
    min-height: 60px;
    font-size: 14px;
    color: #2e7d32;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    width: 100%;
    box-sizing: border-box;
}
.descEditable[contenteditable="true"] {
    border-color: #43a047;
    outline: none;
    min-height: 80px;
}

/* Responsive */
@media(max-width:768px) {
    .tab-buttons { flex-direction: column; }
    table th, table td { font-size:12px; }
    input { font-size:12px; }
}
</style>

<!-- Tabs -->
<div class="tab-buttons">
    <button id="overviewBtn" class="active" onclick="showSection('overview')">Stock Overview</button>
    <button id="updateBtn" onclick="showSection('update')">Update Stock</button>
    <button id="editBtn" onclick="showSection('edit')">Edit Product Info</button>
</div>

<!-- Stock Overview -->
<div id="overview" class="section active">
    <h3>Stock Overview</h3>
    <table>
        <thead>
            <tr>
                <th>Product Name</th>
                <th>Available Quantity</th>
                <th>Price per Unit</th>
            </tr>
        </thead>
        <tbody id="stockBody"></tbody>
    </table>
</div>

<!-- Update Stock -->
<div id="update" class="section">
    <h3>Update Stock</h3>
    <table>
        <thead>
            <tr>
                <th>Product Name</th>
                <th>Price per Unit</th>
                <th>Available Quantity</th>
                <th>Add Quantity</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="updateStockBody"></tbody>
    </table>
</div>

<!-- Edit Product Info -->
<div id="edit" class="section">
    <h3>Edit Product Info</h3>
    <div id="editCardsContainer"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* Firebase Config */
const firebaseConfig = {
    apiKey: "AIzaSyAQicAQ6T5YPCpEuSZ19tXBBotA09SQeYA",
    authDomain: "capstone-swastik.firebaseapp.com",
    projectId: "capstone-swastik",
    storageBucket: "capstone-swastik.appspot.com",
    messagingSenderId: "178017041601",
    appId: "1:178017041601:web:342d8cfe9938b6813a6840"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* Tabs */
function showSection(section) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
    document.getElementById(section).classList.add('active');
    document.getElementById(section + 'Btn').classList.add('active');
}

/* Stock Overview */
function loadStockOverview() {
    const tbody = document.getElementById('stockBody');
    tbody.innerHTML = '';
    db.collection('products').orderBy('name').get().then(snapshot => {
        snapshot.forEach(doc => {
            const d = doc.data();
            tbody.innerHTML += `
                <tr>
                    <td>${d.name}</td>
                    <td>${d.quantity || 0}</td>
                    <td>${d.price || ''}</td>
                </tr>`;
        });
    });
}

/* Update Stock Table */
function loadUpdateStockTable() {
    const tbody = document.getElementById('updateStockBody');
    tbody.innerHTML = '';
    db.collection('products').orderBy('name').get().then(snapshot => {
        snapshot.forEach(doc => {
            const d = doc.data();
            tbody.innerHTML += `
                <tr>
                    <td>${d.name}</td>
                    <td>${d.price || ''}</td>
                    <td id="stock-${doc.id}">${d.quantity || 0}</td>
                    <td><input type="number" id="add-${doc.id}" min="0" value="0"></td>
                    <td><button onclick="updateStockProduct('${doc.id}')">Update</button></td>
                </tr>`;
        });
    });
}

/* Update stock function */
function updateStockProduct(id) {
    const input = document.getElementById(`add-${id}`);
    const addQty = Number(input.value || 0);
    if(addQty <= 0) return alert('Enter a valid quantity');

    const stockCell = document.getElementById(`stock-${id}`);
    db.collection('products').doc(id).get().then(doc => {
        if(!doc.exists) return alert('Product not found');
        const currentQty = Number(doc.data().quantity || 0);
        const newQty = currentQty + addQty;

        db.collection('products').doc(id).update({ quantity: newQty })
            .then(() => {
                stockCell.innerText = newQty;
                input.value = 0;
                alert('Stock updated!');
                loadStockOverview();
            })
            .catch(err => alert(err.message));
    });
}

/* Edit Product Info Cards */
function loadEditCards() {
    const container = document.getElementById('editCardsContainer');
    container.innerHTML = '';
    db.collection('products').orderBy('name').get().then(snapshot => {
        snapshot.forEach(doc => {
            const d = doc.data();
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>${d.name}</h3>
                <label>Price per Unit</label>
                <input class="priceInput" value="${d.price}" readonly>
                <label>Description</label>
                <div class="descEditable" contenteditable="false">${d.description || ''}</div>
                <button class="editBtn">Edit</button>
            `;
            const btn = card.querySelector('.editBtn');
            const price = card.querySelector('.priceInput');
            const desc = card.querySelector('.descEditable');
            btn.onclick = () => {
                if(btn.textContent === 'Edit') {
                    price.removeAttribute('readonly');
                    desc.contentEditable = 'true';
                    btn.textContent = 'Update';
                    btn.classList.add('update');
                } else {
                    db.collection('products').doc(doc.id).update({
                        price: price.value,
                        description: desc.textContent
                    }).then(() => {
                        alert('Product updated!');
                        price.setAttribute('readonly', true);
                        desc.contentEditable = 'false';
                        btn.textContent = 'Edit';
                        btn.classList.remove('update');
                        loadStockOverview();
                        loadUpdateStockTable();
                    });
                }
            };
            container.appendChild(card);
        });
    });
}

/* Init */
loadStockOverview();
loadUpdateStockTable();
loadEditCards();
</script>
